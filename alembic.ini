# alembic.ini
# -----------------------------------------------------------------------
# Alembic configuration for the AI Software Engineering Assistant.
#
# NOTE: `sqlalchemy.url` is intentionally left blank below. The actual
# database URL is injected at runtime by backend/alembic/env.py, which
# reads it from backend.core.config.get_settings() (i.e. from your
# environment variables / .env file). This keeps credentials out of
# version-controlled config files.
# -----------------------------------------------------------------------

[alembic]
# Path to the migration environment, relative to this file's location
# (the project root, alongside Dockerfile and requirements.txt).
script_location = backend/alembic

# Template used to generate migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone used when rendering the "created date" comment in new
# migration files. Left unset (commented out) so Alembic falls back to
# naive local time — an explicitly blank value here crashes newer
# Alembic versions by passing an empty string to ZoneInfo().
# timezone = UTC

# Max length for auto-generated "slug" filenames from migration messages.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc/.pyo files without a source .py file to be
# detected as revisions in the versions/ directory.
sourceless = false

# Additional path(s) to be prepended to sys.path when env.py is run.
# Left empty here since env.py handles its own path setup.
prepend_sys_path = .

# Version path separator; 'os' uses os.pathsep, matching platform norms.
version_path_separator = os

# This is deliberately left blank; env.py overrides it at runtime from
# backend.core.config.get_settings().database_url.
sqlalchemy.url =

[post_write_hooks]
# No post-write formatting hooks configured. To auto-format generated
# migrations with black/ruff, uncomment and configure below.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

# -----------------------------------------------------------------------
# Logging configuration
# -----------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S